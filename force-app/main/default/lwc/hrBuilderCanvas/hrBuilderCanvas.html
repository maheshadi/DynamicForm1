<template>
    <div class="hr-canvas"
         ondragover={handleDragOver}
         ondrop={handleDrop}>

        <template if:false={hasSections}>
            <div class="hr-canvas-empty slds-align_absolute-center slds-p-around_large">
                <div class="slds-illustration slds-illustration_small">
                    <lightning-icon icon-name="utility:drag_and_drop" size="large"
                        class="slds-illustration__svg"></lightning-icon>
                    <div class="slds-illustration__body">
                        <h3 class="slds-text-heading_medium">Drag fields here to build your form</h3>
                        <p class="slds-text-body_regular">or click a field type in the palette</p>
                    </div>
                </div>
            </div>
        </template>

        <template for:each={sections} for:item="section">
            <c-hr-builder-section
                key={section.id}
                section={section}
                selected-field-id={selectedFieldId}
                selected-section-id={selectedSectionId}
                onfieldselected={handleFieldSelected}
                onsectionselected={handleSectionSelected}
                onfieldremoved={handleFieldRemoved}
                onsectionremoved={handleSectionRemoved}
                onfieldreorder={handleFieldReorder}
                onsectiondrop={handleSectionDrop}>
            </c-hr-builder-section>
        </template>

        <div class="slds-m-top_medium slds-align_absolute-center">
            <button class="slds-button slds-button_neutral" onclick={handleAddSection}>
                <lightning-icon icon-name="utility:add" size="x-small"
                    class="slds-m-right_x-small"></lightning-icon>
                Add Section
            </button>
        </div>
    </div>
</template>
