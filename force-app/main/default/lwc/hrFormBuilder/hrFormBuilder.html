<template>
    <div class="hr-form-builder slds-grid slds-grid_horizontal">

        <!-- Left: Field Palette -->
        <div class="hr-builder-palette slds-col slds-size_2-of-12">
            <c-hr-builder-palette
                onhr_fieldadded={handleFieldAdded}>
            </c-hr-builder-palette>
        </div>

        <!-- Centre: Canvas -->
        <div class="hr-builder-canvas slds-col slds-size_7-of-12 slds-p-horizontal_small">
            <div class="slds-card">
                <!-- Toolbar -->
                <div class="slds-card__header slds-grid slds-grid_align-spread slds-p-around_small">
                    <h2 class="slds-card__header-title slds-text-heading_medium">
                        {formSchema.name}
                        <span class="slds-badge slds-m-left_x-small">{statusLabel}</span>
                        <template if:true={hasUnpublishedChanges}>
                            <span class="slds-badge slds-theme_warning slds-m-left_x-small" title="Your draft has changes that are not yet live. Click Publish to update the published form.">
                                Unpublished changes
                            </span>
                        </template>
                    </h2>
                    <div class="slds-button-group">
                        <button class="slds-button slds-button_neutral" onclick={handlePreview}>
                            <lightning-icon icon-name="utility:preview" size="x-small" class="slds-m-right_x-small"></lightning-icon>Preview
                        </button>
                        <button class="slds-button slds-button_brand" onclick={handleSaveDraft} disabled={isSaving}>
                            {saveDraftLabel}
                        </button>
                        <template if:true={canPublish}>
                            <button class="slds-button slds-button_success" onclick={handlePublish} disabled={isPublishing}>
                                {publishLabel}
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Auto-save failure banner (persistent until next successful save) -->
                <template if:true={autoSaveFailed}>
                    <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-horizontal_small" role="alert">
                        <lightning-icon icon-name="utility:warning" size="x-small"
                            class="slds-m-right_x-small" variant="inverse"></lightning-icon>
                        Auto-save failed — your latest changes are not saved yet ({autoSaveError}). Click "Save Draft" to retry.
                    </div>
                </template>

                <!-- Schema JSON size indicator -->
                <div class="slds-p-horizontal_medium slds-p-bottom_x-small">
                    <lightning-progress-bar value={schemaUsagePercent} size="x-small"
                        variant={schemaUsageVariant}></lightning-progress-bar>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                        Schema: {schemaCharCount} / {maxSchemaChars} chars
                    </p>
                </div>

                <!-- Canvas drop zone -->
                <div class="slds-card__body slds-p-around_small">
                    <c-hr-builder-canvas
                        form-schema={formSchema}
                        selected-field-id={selectedFieldId}
                        selected-section-id={selectedSectionId}
                        onfieldselected={handleFieldSelected}
                        onsectionselected={handleSectionSelected}
                        onfieldreorder={handleFieldReorder}
                        onsectionreorder={handleSectionReorder}
                        onsectionadded={handleSectionAdded}
                        onfieldremoved={handleFieldRemoved}
                        onsectionremoved={handleSectionRemoved}>
                    </c-hr-builder-canvas>
                </div>
            </div>
        </div>

        <!-- Right: Properties Panel -->
        <div class="hr-builder-properties slds-col slds-size_3-of-12">
            <c-hr-builder-properties
                selected-field={selectedField}
                selected-section={selectedSection}
                form-schema={formSchema}
                onpropertychanged={handlePropertyChanged}
                onrulesclick={handleRulesClick}>
            </c-hr-builder-properties>
        </div>
    </div>

    <!-- Preview Modal -->
    <template if:true={showPreview}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container" style="max-width:760px">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleClosePreview}>
                        <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-modal__title">Preview — {formSchema.name}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <!-- Preview always renders the current in-memory draft, so what you see here
                         matches what you're actively editing — never a stale published snapshot. -->
                    <template if:false={isFormPublished}>
                        <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_small" role="alert">
                            <lightning-icon icon-name="utility:warning" size="x-small"
                                class="slds-m-right_x-small" variant="inverse"></lightning-icon>
                            This form is not published. Previewing the current draft — publish to make it available.
                        </div>
                    </template>
                    <template if:true={hasUnpublishedChanges}>
                        <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_small" role="alert">
                            <lightning-icon icon-name="utility:warning" size="x-small"
                                class="slds-m-right_x-small" variant="inverse"></lightning-icon>
                            You have unpublished changes. This preview shows your current draft, which differs from the live published form — publish to update it.
                        </div>
                    </template>
                    <c-hr-form-renderer
                        override-schema={formSchema}
                        hide-footer>
                    </c-hr-form-renderer>
                </div>
                <footer class="slds-modal__footer slds-grid slds-grid_align-spread">
                    <button class="slds-button slds-button_neutral" onclick={handlePreviewReset}>
                        <lightning-icon icon-name="utility:refresh" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        Reset
                    </button>
                    <div class="slds-button-group">
                        <button class="slds-button slds-button_outline-brand" onclick={handlePreviewSaveDraft}>Save Draft</button>
                        <button class="slds-button slds-button_brand" onclick={handlePreviewSubmit}>Submit</button>
                        <button class="slds-button slds-button_neutral" onclick={handleClosePreview}>Close</button>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Rules Modal -->
    <template if:true={showRulesEditor}>
        <div class="slds-backdrop slds-backdrop_open"></div>
        <div role="dialog" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Logic Rules &amp; Publish</h2>
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={handleCloseRules}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-hr-builder-rule-editor
                        form-schema={formSchema}
                        onruleupdated={handleRuleUpdated}>
                    </c-hr-builder-rule-editor>
                </div>
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button_neutral" onclick={handleCloseRules}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={handleSaveAndCloseRules} disabled={isSaving}>{saveRulesLabel}</button>
                </footer>
            </div>
        </div>
    </template>

    <!-- Toast notifications -->
    <template if:true={toastMessage}>
        <div class="slds-notify slds-notify_toast slds-theme_{toastVariant}" role="alert"
             style="position:fixed;top:1rem;right:1rem;z-index:9999;min-width:300px;">
            <span class="slds-assistive-text">{toastVariant}</span>
            <lightning-icon icon-name={toastIcon} size="small" class="slds-m-right_small"
                variant="inverse"></lightning-icon>
            <p class="slds-text-body_regular">{toastMessage}</p>
        </div>
    </template>
</template>
