<template>
    <lightning-input
        type={inputType}
        value={value}
        placeholder={field.placeholder}
        min-length={field.minLength}
        max-length={field.maxLength}
        pattern={field.pattern}
        message-when-too-short={field.validationMessage}
        message-when-pattern-mismatch={field.validationMessage}
        read-only={field.readOnly}
        disabled={isDisabled}
        required={field.required}
        onchange={handleChange}>
    </lightning-input>
</template>
