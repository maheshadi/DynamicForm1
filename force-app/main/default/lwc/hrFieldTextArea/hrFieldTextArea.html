<template>
    <template if:true={isRichText}>
        <lightning-input-rich-text label={field.label} value={value} placeholder={field.placeholder}
            disabled={isDisabled} onchange={handleChange}></lightning-input-rich-text>
    </template>
    <template if:false={isRichText}>
        <lightning-textarea label={field.label} variant="label-hidden"
            value={value} placeholder={field.placeholder}
            max-length={field.maxLength} disabled={isDisabled}
            required={field.required} onchange={handleChange}></lightning-textarea>
    </template>
</template>
