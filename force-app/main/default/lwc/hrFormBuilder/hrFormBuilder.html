<template>
    <div class="hr-form-builder slds-grid slds-grid_horizontal">

        <!-- Left: Field Palette -->
        <div class="hr-builder-palette slds-col slds-size_2-of-12">
            <c-hr-builder-palette
                onhr_fieldadded={handleFieldAdded}>
            </c-hr-builder-palette>
        </div>

        <!-- Centre: Canvas -->
        <div class="hr-builder-canvas slds-col slds-size_7-of-12 slds-p-horizontal_small">
            <div class="slds-card">
                <!-- Toolbar -->
                <div class="slds-card__header slds-grid slds-grid_align-spread slds-p-around_small">
                    <h2 class="slds-card__header-title slds-text-heading_medium">
                        {formSchema.name}
                        <span class="slds-badge slds-m-left_x-small">{statusLabel}</span>
                    </h2>
                    <div class="slds-button-group">
                        <button class="slds-button slds-button_neutral" onclick={handlePreview}>
                            <lightning-icon icon-name="utility:preview" size="x-small" class="slds-m-right_x-small"></lightning-icon>Preview
                        </button>
                        <button class="slds-button slds-button_brand" onclick={handleSaveDraft} disabled={isSaving}>
                            {saveDraftLabel}
                        </button>
                        <template if:true={canPublish}>
                            <button class="slds-button slds-button_success" onclick={handlePublish} disabled={isPublishing}>
                                {publishLabel}
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Schema JSON size indicator -->
                <div class="slds-p-horizontal_medium slds-p-bottom_x-small">
                    <lightning-progress-bar value={schemaUsagePercent} size="x-small"
                        variant={schemaUsageVariant}></lightning-progress-bar>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                        Schema: {schemaCharCount} / {maxSchemaChars} chars
                    </p>
                </div>

                <!-- Canvas drop zone -->
                <div class="slds-card__body slds-p-around_small">
                    <c-hr-builder-canvas
                        form-schema={formSchema}
                        selected-field-id={selectedFieldId}
                        selected-section-id={selectedSectionId}
                        onfieldselected={handleFieldSelected}
                        onsectionselected={handleSectionSelected}
                        onfieldreorder={handleFieldReorder}
                        onsectionreorder={handleSectionReorder}
                        onsectionadded={handleSectionAdded}
                        onfieldremoved={handleFieldRemoved}
                        onsectionremoved={handleSectionRemoved}>
                    </c-hr-builder-canvas>
                </div>
            </div>
        </div>

        <!-- Right: Properties Panel -->
        <div class="hr-builder-properties slds-col slds-size_3-of-12">
            <c-hr-builder-properties
                selected-field={selectedField}
                selected-section={selectedSection}
                form-schema={formSchema}
                onpropertychanged={handlePropertyChanged}
                onrulesclick={handleRulesClick}>
            </c-hr-builder-properties>
        </div>
    </div>

    <!-- Rules Modal -->
    <template if:true={showRulesEditor}>
        <div class="slds-backdrop slds-backdrop_open"></div>
        <div role="dialog" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Logic Rules &amp; Publish</h2>
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={handleCloseRules}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-hr-builder-rule-editor
                        form-schema={formSchema}
                        onruleupdated={handleRuleUpdated}>
                    </c-hr-builder-rule-editor>
                </div>
            </div>
        </div>
    </template>

    <!-- Toast notifications -->
    <template if:true={toastMessage}>
        <div class="slds-notify slds-notify_toast slds-theme_{toastVariant}" role="alert"
             style="position:fixed;top:1rem;right:1rem;z-index:9999;min-width:300px;">
            <span class="slds-assistive-text">{toastVariant}</span>
            <lightning-icon icon-name={toastIcon} size="small" class="slds-m-right_small"
                variant="inverse"></lightning-icon>
            <p class="slds-text-body_regular">{toastMessage}</p>
        </div>
    </template>
</template>
