<template>
    <!-- Loading -->
    <template if:true={isLoading}>
        <div class="fc-loading">
            <lightning-spinner alternative-text="Loading forms..." size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- Error -->
    <template if:true={hasError}>
        <div class="slds-box slds-theme_error slds-m-around_medium">
            <lightning-icon icon-name="utility:error" variant="inverse" size="small"></lightning-icon>
            <span class="slds-m-left_small">{errorMessage}</span>
        </div>
    </template>

    <template if:false={isLoading}>
        <template if:false={hasError}>
            <div class="fc-outer">

                <!-- ── Page Header ──────────────────────────────── -->
                <div class="fc-page-header">
                    <h1 class="fc-page-title">Form Library</h1>
                    <div class="fc-header-actions">
                        <lightning-button label="Import" icon-name="utility:upload" variant="neutral" onclick={handleImport}></lightning-button>
                        <lightning-button label="New Form" icon-name="utility:add" variant="brand" onclick={handleNewForm}></lightning-button>
                    </div>
                </div>

                <!-- ── Stats Bar ────────────────────────────────── -->
                <div class="fc-stats-bar">
                    <div class="fc-stat">
                        <div class="fc-stat-num">{totalCount}</div>
                        <div class="fc-stat-lbl">Total Forms</div>
                    </div>
                    <div class="fc-stat-sep"></div>
                    <div class="fc-stat">
                        <div class="fc-stat-num fc-published">{publishedCount}</div>
                        <div class="fc-stat-lbl">Published</div>
                    </div>
                    <div class="fc-stat-sep"></div>
                    <div class="fc-stat">
                        <div class="fc-stat-num fc-draft">{draftCount}</div>
                        <div class="fc-stat-lbl">Draft</div>
                    </div>
                    <div class="fc-stat-sep"></div>
                    <div class="fc-stat">
                        <div class="fc-stat-num fc-archived">{archivedCount}</div>
                        <div class="fc-stat-lbl">Archived</div>
                    </div>
                    <div class="fc-stat-sep"></div>
                    <div class="fc-stat">
                        <div class="fc-stat-num fc-cat">{categoryCount}</div>
                        <div class="fc-stat-lbl">Categories</div>
                    </div>
                </div>

                <div class="fc-body">

                    <!-- ── Sidebar ──────────────────────────────── -->
                    <aside class="fc-sidebar">
                        <div class="fc-sidebar-section-title">Categories</div>
                        <ul class="fc-cat-list">
                            <template for:each={categories} for:item="cat">
                                <li key={cat.value}
                                    class={cat.liClass}
                                    data-value={cat.value}
                                    onclick={handleCategoryClick}>
                                    {cat.label}
                                </li>
                            </template>
                        </ul>

                        <div class="fc-sidebar-divider"></div>
                        <div class="fc-sidebar-section-title">Quick Actions</div>
                        <ul class="fc-cat-list">
                            <li class="fc-quick-action">📋 Templates</li>
                            <li class="fc-quick-action">📦 Export All</li>
                            <li class="fc-quick-action">📈 Analytics</li>
                        </ul>
                    </aside>

                    <!-- ── Main ─────────────────────────────────── -->
                    <div class="fc-main">

                        <!-- Toolbar -->
                        <div class="fc-toolbar">
                            <div class="fc-search-wrap">
                                <lightning-input
                                    type="search"
                                    placeholder="Search forms..."
                                    value={searchTerm}
                                    onchange={handleSearch}
                                    class="fc-search">
                                </lightning-input>
                            </div>
                            <lightning-combobox
                                placeholder="All Status"
                                options={statusOptions}
                                value={selectedStatus}
                                onchange={handleStatus}
                                class="fc-combo">
                            </lightning-combobox>
                            <lightning-combobox
                                placeholder="Modified ↓"
                                options={sortOptions}
                                value={sortField}
                                onchange={handleSort}
                                class="fc-combo">
                            </lightning-combobox>
                        </div>

                        <!-- Empty state -->
                        <template if:true={isEmpty}>
                            <div class="fc-empty">
                                <lightning-icon icon-name="utility:search" size="large" variant="brand"></lightning-icon>
                                <h3 class="slds-text-heading_medium slds-m-top_medium">No forms found</h3>
                                <p>Try adjusting your search or filters.</p>
                            </div>
                        </template>

                        <!-- Grid -->
                        <template if:false={isEmpty}>
                            <div class="fc-grid">
                                <template for:each={pageItems} for:item="form">
                                    <div key={form.id} class="fc-card" style={form.cardStyle}>

                                        <!-- Card Header -->
                                        <div class="fc-card-header">
                                            <span class="fc-cat-dot" style={form.dotStyle}></span>
                                            <span class="fc-form-name" title={form.name}>{form.name}</span>
                                            <span class="fc-badge" style={form.badgeStyle}>{form.status}</span>
                                        </div>

                                        <!-- Meta row 1 -->
                                        <div class="fc-card-meta">
                                            <span class="fc-meta-chip">
                                                <lightning-icon icon-name="utility:form" size="xx-small"></lightning-icon>
                                                &nbsp;{form.totalSubs}&nbsp;submissions
                                            </span>
                                            <span class="fc-cat-pill" style={form.catPillStyle}>{form.category}</span>
                                        </div>

                                        <!-- Meta row 2 -->
                                        <div class="fc-card-meta-2">
                                            <span>Mod. {form.modDate}</span>
                                        </div>

                                        <!-- Actions -->
                                        <div class="fc-card-actions">
                                            <button class="fc-btn fc-btn-neutral" data-id={form.id} onclick={handleEdit}>Edit</button>
                                            <template if:true={form.isPublished}>
                                                <button class="fc-btn fc-btn-brand" data-id={form.id} onclick={handlePreview}>Preview</button>
                                            </template>
                                            <button class="fc-btn fc-btn-neutral" data-id={form.id} onclick={handleClone}>Clone</button>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Pagination -->
                            <div class="fc-pagination">
                                <span class="fc-page-info">Showing {pageStart} – {pageEnd} of {resultCount} forms</span>
                                <button class="fc-page-btn" disabled={isPrevDisabled} onclick={handlePrev}>‹ Prev</button>
                                <button class="fc-page-btn" disabled={isNextDisabled} onclick={handleNext}>Next ›</button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </template>

    <!-- ── Preview Modal ─────────────────────────────────────────── -->
    <template if:true={showPreview}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container" style="max-width:720px">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleClosePreview}>
                        <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-modal__title">{previewFormName}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={previewLoading}>
                        <lightning-spinner alternative-text="Loading preview..." size="medium"></lightning-spinner>
                    </template>
                    <template if:true={previewSchema}>
                        <c-hr-form-renderer
                            override-schema={previewSchema}
                            hide-footer>
                        </c-hr-form-renderer>
                    </template>
                </div>
                <footer class="slds-modal__footer slds-grid slds-grid_align-spread">
                    <button class="slds-button slds-button_neutral" onclick={handlePreviewReset}>
                        <lightning-icon icon-name="utility:refresh" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        Reset
                    </button>
                    <div class="slds-button-group">
                        <button class="slds-button slds-button_outline-brand" onclick={handlePreviewSaveDraft}>Save Draft</button>
                        <button class="slds-button slds-button_brand" onclick={handlePreviewSubmit}>Submit</button>
                        <button class="slds-button slds-button_neutral" onclick={handleClosePreview}>Close</button>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Toast -->
    <template if:true={toastMessage}>
        <div class="fc-toast fc-toast_{toastVariant}" role="alert">
            <lightning-icon icon-name={toastIcon} size="x-small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
            {toastMessage}
        </div>
    </template>
</template>
