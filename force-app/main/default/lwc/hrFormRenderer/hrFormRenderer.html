<template>
    <div class="hr-form-renderer">

        <!-- No form selected: show guidance instead of erroring -->
        <template if:false={hasFormSelected}>
            <div class="slds-box slds-theme_shade slds-align_absolute-center slds-p-around_x-large slds-m-around_large">
                <div class="slds-align_absolute-center" style="flex-direction:column;display:flex;align-items:center;">
                    <lightning-icon icon-name="utility:form" size="large" variant="brand"></lightning-icon>
                    <h3 class="slds-text-heading_medium slds-m-top_medium">No Form Selected</h3>
                    <p class="slds-text-body_regular slds-m-top_small slds-text-color_weak">
                        Pass a <strong>formApiName</strong> property to render a published form here.
                    </p>
                </div>
            </div>
        </template>

        <template if:true={hasFormSelected}>
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading form..." size="medium"></lightning-spinner>
        </template>

        <template if:true={hasError}>
            <div class="slds-notify slds-notify_alert slds-theme_error" role="alert">
                <span>{errorMessage}</span>
                <p class="slds-text-body_small">Please contact your administrator.</p>
            </div>
        </template>

        <template if:true={isSubmitted}>
            <div class="slds-illustration slds-illustration_small slds-align_absolute-center slds-p-around_large">
                <lightning-icon icon-name="utility:success" size="large" variant="success"></lightning-icon>
                <h3 class="slds-text-heading_medium slds-m-top_medium">{successMessage}</h3>
            </div>
        </template>

        <template if:false={isSubmitted}>
            <template if:true={isReady}>

                <!-- Confirmation screen -->
                <template if:true={showConfirmation}>
                    <div class="slds-card slds-p-around_medium">
                        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Review Your Submission</h2>
                        <template for:each={confirmationRows} for:item="row">
                            <div key={row.label} class="slds-grid slds-border_bottom slds-p-vertical_x-small">
                                <span class="slds-col slds-text-color_weak slds-size_1-of-3">{row.label}</span>
                                <span class="slds-col slds-size_2-of-3">{row.value}</span>
                            </div>
                        </template>
                        <div class="slds-m-top_medium slds-grid slds-grid_align-end slds-gutters_x-small">
                            <button class="slds-button slds-button_neutral" onclick={handleCancelConfirm}>Back</button>
                            <button class="slds-button slds-button_brand" onclick={handleConfirmSubmit}>Submit</button>
                        </div>
                    </div>
                </template>

                <template if:false={showConfirmation}>
                    <!-- Sections -->
                    <template for:each={visibleSections} for:item="section">
                        <c-hr-form-section
                            key={section.id}
                            section={section}
                            field-values={fieldValues}
                            field-visibility={fieldVisibility}
                            field-required-overrides={fieldRequiredOverrides}
                            field-disabled-overrides={fieldDisabledOverrides}
                            onvaluechanged={handleValueChanged}>
                        </c-hr-form-section>
                    </template>

                    <!-- Footer -->
                    <c-hr-form-footer
                        allow-draft-save={config.allowDraftSave}
                        is-submitting={isSubmitting}
                        has-draft={hasDraft}
                        onsubmit={handleSubmit}
                        onsavedraft={handleSaveDraft}
                        oncancel={handleCancel}>
                    </c-hr-form-footer>
                </template>
            </template>
        </template>
        </template><!-- /hasFormSelected -->
    </div>
</template>
